<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Icon Studio — 24×36 Vertical Banner</title>
  <style>
    :root {
      --wine: #4a1830;
      --wine-mid: #6e2848;
      --rose: #9e6078;
      --gold: #b8955a;
      --line: rgba(160, 120, 140, 0.3);
    }

    * {
      box-sizing: border-box;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* ── OUTER BANNER ──────────────────────────────────── */
    .banner {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      outline: 0.55vw solid var(--wine);
      outline-offset: -0.7vw;
      background: white;
    }

    /* ── HEADER BAR ────────────────────────────────────── */
    .header-bar {
      height: 9vh;
      flex-shrink: 0;
      background: linear-gradient(160deg, #1c0a15 0%, var(--wine) 50%, var(--wine-mid) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6vh;
      position: relative;
      overflow: hidden;
    }

    .header-bar::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 2vw 2vw;
      pointer-events: none;
    }

    .header-ornament {
      color: rgba(255,255,255,0.8);
      font-size: 2vh;
      letter-spacing: 3vw;
      position: relative;
      z-index: 1;
    }

    .header-brand {
      color: white;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 5vh;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 0.9vw;
      text-shadow: 0 0.3vh 0.8vh rgba(0,0,0,0.4);
      line-height: 1;
      position: relative;
      z-index: 1;
    }

    /* ── PANEL GRID — 2 cols × 3 rows ──────────────────── */
    .panel-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 1.2vw;
      padding: 1.2vw;
      background: linear-gradient(180deg, #f5eff2 0%, #faf6f8 100%);
      min-height: 0;
    }

    /* ── PANEL — full-bleed photo ──────────────────────── */
    .panel {
      position: relative;
      border-radius: 1.2vw;
      border: 0.2vw solid var(--line);
      overflow: hidden;
      box-shadow: 0 0.4vh 1.8vh rgba(50,10,30,0.22);
    }

    /* ── PHOTO fills the entire panel ─────────────────── */
    .panel-photo {
      position: absolute;
      inset: 0;
    }

    .panel-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* CSS gradient fallbacks when image unavailable */
    .photo-hair      { background: linear-gradient(145deg, #3b2d6b, #7c4fa0, #d61b68); }
    .photo-wash      { background: linear-gradient(145deg, #1a5276, #2980b9, #7fb3d3); }
    .photo-brazilian { background: linear-gradient(145deg, #6b2d6b, #a8124e, #d61b68); }
    .photo-lashes    { background: linear-gradient(145deg, #1a3a4e, #2c3e50, #566573); }
    .photo-eyebrows  { background: linear-gradient(145deg, #5b2333, #a8124e, #d61b68); }
    .photo-threading { background: linear-gradient(145deg, #4a1942, #7b3f6e, #c25c8e); }

    /* ── TEXT OVERLAY — pinned to panel bottom ─────────── */
    .panel-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      /* deep gradient so text is always readable */
      background: linear-gradient(
        to top,
        rgba(15, 5, 10, 0.88) 0%,
        rgba(60, 20, 40, 0.55) 50%,
        transparent 100%
      );
      padding: 5vh 2.5vw 2.5vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.7vh;
    }

    .service-name {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 3.4vh;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.12vw;
      line-height: 1.2;
      text-shadow: 0 0.2vh 0.6vh rgba(0,0,0,0.6);
    }

    .price-divider {
      width: 10vw;
      height: 0.2vh;
      background: rgba(255,255,255,0.45);
      flex-shrink: 0;
    }

    .service-price {
      font-size: 5.8vh;
      font-weight: 900;
      color: #ffffff;
      line-height: 1;
      text-shadow: 0 0.2vh 0.6vh rgba(0,0,0,0.5);
    }

    .service-price-note {
      font-size: 2.2vh;
      font-style: italic;
      font-weight: 700;
      color: #e8c98a;   /* soft muted gold */
      line-height: 1.2;
      text-shadow: 0 0.1vh 0.3vh rgba(0,0,0,0.5);
    }

    /* ── FOOTER ────────────────────────────────────────── */
    .footer-bar {
      height: 4.5vh;
      flex-shrink: 0;
      background: #1c0a15;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.55vh;
      font-weight: 700;
      letter-spacing: 0.3vw;
      text-transform: uppercase;
    }

    .footer-bar span {
      opacity: 0.45;
      margin: 0 2vw;
    }
  </style>
</head>
<body>
  <div class="banner">

    <!-- HEADER -->
    <div class="header-bar">
      <div class="header-ornament">✿ &nbsp; ✦ &nbsp; ✿</div>
      <h1 class="header-brand">Icon Studio</h1>
    </div>

    <!-- 6-PANEL GRID (2 cols × 3 rows) -->
    <div class="panel-grid">

      <!-- Panel 1: Hair Cut & Color -->
      <div class="panel">
        <div class="panel-photo photo-hair">
          <img src="banner-images/hair-cut.jpg" alt="Hair Cut & Color" />
        </div>
        <div class="panel-overlay">
          <h2 class="service-name">Hair Cut &amp; Color</h2>
          <div class="price-divider"></div>
          <span class="service-price-note">Consultation Required</span>
        </div>
      </div>

      <!-- Panel 2: Wash & Cut -->
      <div class="panel">
        <div class="panel-photo photo-wash">
          <img src="banner-images/wash-cut.jpg" alt="Wash & Cut" />
        </div>
        <div class="panel-overlay">
          <h2 class="service-name">Wash &amp; Cut</h2>
          <div class="price-divider"></div>
          <span class="service-price">$40</span>
        </div>
      </div>

      <!-- Panel 3: Brazilian Full -->
      <div class="panel">
        <div class="panel-photo photo-brazilian">
          <img src="banner-images/brazilian.jpg" alt="Brazilian Full" />
        </div>
        <div class="panel-overlay">
          <h2 class="service-name">Brazilian Full</h2>
          <div class="price-divider"></div>
          <span class="service-price">$45</span>
        </div>
      </div>

      <!-- Panel 4: Lashes Extension -->
      <div class="panel">
        <div class="panel-photo photo-lashes">
          <img src="banner-images/lashes.jpg" alt="Lashes Extension" />
        </div>
        <div class="panel-overlay">
          <h2 class="service-name">Lashes Extension</h2>
          <div class="price-divider"></div>
          <span class="service-price">$35</span>
        </div>
      </div>

      <!-- Panel 5: Eyebrows -->
      <div class="panel">
        <div class="panel-photo photo-eyebrows">
          <img src="banner-images/eyebrows.jpg" alt="Eyebrows" />
        </div>
        <div class="panel-overlay">
          <h2 class="service-name">Eyebrows</h2>
          <div class="price-divider"></div>
          <span class="service-price">$8</span>
        </div>
      </div>

      <!-- Panel 6: Threading -->
      <div class="panel">
        <div class="panel-photo photo-threading">
          <img src="banner-images/threading.jpg" alt="Threading" />
        </div>
        <div class="panel-overlay">
          <h2 class="service-name">Threading</h2>
          <div class="price-divider"></div>
          <span class="service-price-note">Starting at $8</span>
        </div>
      </div>

    </div><!-- /panel-grid -->

    <!-- FOOTER -->
    <div class="footer-bar">
      Walk-Ins Welcome
    </div>

  </div>
</body>
</html>
